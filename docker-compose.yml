services:
  postgres:
    image: postgres:16-alpine
    container_name: auction_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-auction_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-auction_pass}
      POSTGRES_DB: ${POSTGRES_DB:-auction_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-auction_user}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: auction_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: auction_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-auction_user}:${POSTGRES_PASSWORD:-auction_pass}@postgres:5432/${POSTGRES_DB:-auction_db}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      NODE_ENV: production
      BACKEND_PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    ports:
      - '3001:3001'

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: auction_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001/api}
      VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:3001}
    ports:
      - '80:80'

volumes:
  postgres_data:
  redis_data:
